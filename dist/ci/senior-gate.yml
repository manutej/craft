# senior-gate.yml — the mechanical half of craft.
#
# Copy this into the repo you want guarded:  .github/workflows/senior-gate.yml
#
# Rules-as-prose earn ~25–40% compliance. A REQUIRED CI gate that actually runs
# your linters, type-checker, and tests gets you to ~95%. This file is that gate.
# Uncomment the block matching your stack, then make `gate` a required status
# check in branch protection (Settings → Branches → Require status checks).

name: senior-gate

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

